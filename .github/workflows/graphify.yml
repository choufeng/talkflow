name: Update Knowledge Graph

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install graphify
        run: pip3 install graphifyy

      - name: Update graph
        run: |
          # --force: 覆盖旧图（若节点数减少，通常是代码重构删除）
          graphify . --update --force --no-viz 2>&1 || {
            echo "::warning::Graph update partially failed (semantic extraction may need manual run)"
            # AST 部分通常能完成，继续尝试保存
          }

      - name: Commit updated graph
        run: |
          if [ -n "$(git status --porcelain graphify-out/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add graphify-out/
            git commit -m "chore: update knowledge graph [ci]" || true
            git push
          else
            echo "Graph is up to date."
          fi
